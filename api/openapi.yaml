      description: Just-In-Time (JIT) provisioning policy for the organization
      example:
        Enabled: false
      nullable: true
      properties:
        Enabled:
          description: Indicates if JIT provisioning is enabled
          example: false
          nullable: true
          type: boolean
      type: object
    OrganizationsPolicyBase_MFAPolicy:
      description: Multi-Factor Authentication (MFA) policy for the organization
      example:
        EnforcementMode: optional
      nullable: true
      properties:
        EnforcementMode:
          description: Mode of enforcement for Multi-Factor Authentication (MFA)
          example: optional
          type: string
      type: object
    OrganizationsPolicyBase_MemberPolicy:
      description: Member policy for the organization
      example:
        DefaultMemberRole: role_Z5OCrdbNBZ8OzruS
      nullable: true
      properties:
        DefaultMemberRole:
          description: Default role assigned to new members in the organization
          example: role_Z5OCrdbNBZ8OzruS
          type: string
      type: object
    OrganizationsPolicyBase_PasswordPolicy:
      description: Password policy for the organization
      example:
        RequireNumber: true
        RequireSpecialChar: true
        ExpiryDays: 100
        MinLength: 8
        RequireUppercase: true
        RequireLowercase: true
        MaxLength: 25
      nullable: true
      properties:
        ExpiryDays:
          description: Number of days after which the password expires
          example: 100
          type: integer
        MaxLength:
          description: Maximum length of the password
          example: 25
          type: integer
        MinLength:
          description: Minimum length of the password
          example: 8
          type: integer
        RequireLowercase:
          description: Indicates if at least one lowercase letter is required in the
            password
          type: boolean
        RequireNumber:
          description: Indicates if at least one number is required in the password
          type: boolean
        RequireSpecialChar:
          description: Indicates if at least one special character is required in
            the password
          type: boolean
        RequireUppercase:
          description: Indicates if at least one uppercase letter is required in the
            password
          type: boolean
      type: object
    OrganizationsPolicyBase_SessionPolicy:
      description: Session policy for the organization
      example:
        AccessTokenTTL: 14400
        RefreshTokenTTL: 324345
      nullable: true
      properties:
        AccessTokenTTL:
          description: Time-to-live (TTL) for access tokens in seconds
          example: 14400
          type: integer
        RefreshTokenTTL:
          description: Time-to-live (TTL) for refresh tokens in seconds
          example: 324345
          type: integer
      type: object
