  parameters:
    InvitationId:
      description: "The ID of the invitation. The ID is typically in the format *inv_<unique_id>*,\
        \ where *<unique_id>* is a string of alphanumeric characters."
      example: inv_123456789
      explode: false
      in: path
      name: invitationid
      required: true
      schema:
        type: string
      style: simple
    InvitationUrl:
      description: The URL to which the user will be redirected after accepting the
        invitation. This URL should be a valid URL and can include query parameters
        if needed.
      example: https://example.com/accept-invite
      explode: true
      in: query
      name: invitation_url
      required: false
      schema:
        type: string
      style: form
    orgId:
      description: Organization ID
      example: org_1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
      explode: false
      in: path
      name: orgId
      required: true
      schema:
        type: string
      style: simple
    connId:
      description: Organization Connection ID
      example: conn_1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
      explode: false
      in: path
      name: connId
      required: true
      schema:
        type: string
      style: simple
    groupRoleId:
      description: Organization Connection Group Role ID
      example: group_role_1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
      explode: false
      in: path
      name: groupRoleId
      required: true
      schema:
        type: string
      style: simple
    domainId:
      description: Organization Domain ID
      example: org_domain_1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
      explode: false
      in: path
      name: domainId
      required: true
      schema:
        type: string
      style: simple
    permissionId:
      description: The unique identifier for the permission
      example: perm_2enk23n3
      explode: false
      in: path
      name: id
      required: true
      schema:
        type: string
      style: simple
    roleId:
      description: Role ID
      example: role_2enk23n3
      explode: false
      in: path
      name: id
      required: true
      schema:
        type: string
      style: simple
    Uid:
      description: UID of the user
      example: "123456789"
      explode: false
      in: path
      name: uid
      required: true
      schema:
        type: string
      style: simple
  schemas:
    Invitation:
      example:
        Status: invited
        EmailId: user@example.com
        OrgId: org_123456789
        ExpirationDate: 2023-01-01T00:00:00Z
        CreatedDate: 2023-01-01T00:00:00Z
        Id: inv_123456789
        RoleIds:
        - role_12345
        - role_56789
        ModifiedDate: 2023-01-01T00:00:00Z
        InviterUid: "123456789"
      properties:
        Id:
          description: "The unique identifier for the invitation. The ID is typically\
            \ in the format *inv_<unique_id>*, where *<unique_id>* is a string of\
            \ alphanumeric characters."
          example: inv_123456789
          type: string
        EmailId:
          description: The email address of the user to whom the invitation is sent.
          example: user@example.com
          type: string
        Status:
          description: "The status of the invitation. Possible values are *invited*,\
            \ *accepted*, *expired*, and *revoked*."
          enum:
          - invited
          - accepted
          - expired
          - revoked
          example: invited
          type: string
        RoleIds:
          description: "The list of role IDs associated with the invitation. Each\
            \ role ID is typically in the format *role_<unique_id>*, where *<unique_id>*\
            \ is a string of alphanumeric characters."
          example:
          - role_12345
          - role_56789
          items:
            type: string
          type: array
        OrgId:
          description: "The unique identifier for the organization associated with\
            \ the invitation. The ID is typically in the format *org_<unique_id>*,\
            \ where *<unique_id>* is a string of alphanumeric characters."
          example: org_123456789
          type: string
        CreatedDate:
          description: "The date and time when the invitation was created, UTC format."
          example: 2023-01-01T00:00:00Z
          format: date-time
          type: string
        ExpirationDate:
          description: "The date and time when the invitation expires, UTC format."
          example: 2023-01-01T00:00:00Z
          format: date-time
          type: string
        ModifiedDate:
          description: "The date and time when the invitation was last modified, UTC\
            \ format."
          example: 2023-01-01T00:00:00Z
          format: date-time
          type: string
        InviterUid:
          description: "The unique identifier for the user who sent the invitation.\
            \ The ID is typically in the format unique_id, where *<unique_id>* is\
            \ a string of alphanumeric characters."
          example: "123456789"
          type: string
      type: object
    ErrorResponse:
      example:
        Description: Description
        Message: Message
        ErrorCode: 0
      properties:
        Message:
          description: Brief message describing the error.
          type: string
        Description:
          description: Detailed description of the error.
          type: string
        ErrorCode:
          description: Error code for identifying the error type.
          type: integer
      type: object
    SendInvitation:
      example:
        inviterUid: inviterUid
        roleIds:
        - role_12345
        - role_56789
        email: email
        orgId: orgId
      properties:
        email:
          format: email
          type: string
        roleIds:
          example:
          - role_12345
          - role_56789
          items:
            type: string
          type: array
        orgId:
          type: string
        inviterUid:
          type: string
      required:
      - email
      - inviterUid
      - orgId
      - roleIds
      type: object
    ResendInvitation:
      example:
        Resent: true
      properties:
        Resent:
          description: Indicates whether the invitation was resent
          example: true
          type: boolean
      type: object
    OrganizationDomainRequest:
      example:
        DomainName: example.com
        IsVerified: false
      properties:
        DomainName:
          description: The domain name to be verified
          example: example.com
          type: string
        IsVerified:
          description: Indicates whether the domain has been verified
          example: false
          type: boolean
      type: object
    OrganizationBase:
      example:
        Domains:
        - DomainName: example.com
          IsVerified: false
        - DomainName: example.com
          IsVerified: false
        Metadata:
