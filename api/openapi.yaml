          example: lastName
          type: string
      type: object
    OrganizationsConnectionSamlBase_IDPCertificate:
      nullable: true
      properties:
        Certificate:
          description: The Identity Provider's certificate in PEM format.
          example: |
            -----BEGIN CERTIFICATE-----
            ...
            -----END CERTIFICATE-----
          type: string
        NotAfter:
          description: The expiration date of the IdP certificate.
          example: 2023-10-01T00:00:00Z
          format: date-time
          type: string
        NotBefore:
          description: The start date of the IdP certificate validity.
          example: 2023-10-01T00:00:00Z
          format: date-time
          type: string
      type: object
