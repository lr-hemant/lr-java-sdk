      - properties:
          Id:
            description: Unique identifier of the group-to-role mapping.
            example: group_role_Z6NFN5kupP7lwD6G
            type: string
        type: object
      example:
        Id: group_role_Z6NFN5kupP7lwD6G
        RoleId: role_Z6NE1ZkupP7lwD6E
        GroupId: eca8da89-09ed-476f-a689-11fa9a0b14ce
        Name: Security
